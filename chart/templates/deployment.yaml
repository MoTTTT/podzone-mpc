apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "podzone-mpc.fullname" . }}
  labels:
    {{- include "podzone-mpc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "podzone-mpc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "podzone-mpc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.env.mcpPort | int }}
              protocol: TCP
          env:
            - name: QDRANT_URL
              value: {{ .Values.env.qdrantUrl | quote }}
            - name: OLLAMA_URL
              value: {{ .Values.env.ollamaUrl | quote }}
            - name: OLLAMA_EMBED_MODEL
              value: {{ .Values.env.ollamaEmbedModel | quote }}
            - name: QDRANT_COLLECTION
              value: {{ .Values.env.qdrantCollection | quote }}
            - name: MCP_TRANSPORT
              value: {{ .Values.env.mcpTransport | quote }}
            - name: MCP_PORT
              value: {{ .Values.env.mcpPort | quote }}
            {{- if .Values.env.mcpAuthToken }}
            - name: MCP_AUTH_TOKEN
              value: {{ .Values.env.mcpAuthToken | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
